<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    body { background: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="qr"></div>
  <script src="qrcode.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search)
    const text = params.get('text') || params.get('chl') || ''
    const size = Math.min(Math.max(parseInt(params.get('size') || '200'), 80), 600)

    if (text) {
      new QRCode(document.getElementById('qr'), {
        text: text,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      })
    }
  </script>
</body>
</html>
